<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 💡 核心修正：將 characters.html 的分頁標題精準更換為大寫的 CHARACTERS -->
    <title>CHARACTERS</title>
    <!-- 引入全域共用樣式表 -->
    <link rel="stylesheet" href="theme.css">
    <style>
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: calc(100vh - 100px); max-width: 800px; margin-top: 40px; border: 1px solid #b37446; background: rgba(12,8,5,0.95); padding: 40px; text-align: center; animation: breathe 5s infinite; position: relative; overflow: hidden; }
        .lobby-header-group { transition: opacity 0.2s ease, transform 0.2s ease; }
        .lobby-header-group.fnf-hide { opacity: 0 !important; transform: translateY(-20px) scale(0.95) !important; }
        .lobby-title { font-size: 32px; color: #e5bd9c; margin: 0 0 10px 0; letter-spacing: 4px; display: block; width: 100%; text-align: center; }
        .lobby-subtitle { font-size: 14px; color: #8c7361; margin: 0; letter-spacing: 1.5px; text-transform: uppercase; display: block; width: 100%; text-align: center; }
        
        .directory-box { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        
        /* 20px PC 使用者規格方框 */
        .dir-btn { display: flex; align-items: center; justify-content: center; width: 100%; background: transparent; padding: 22px 16px; font-size: 20px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; position: relative; transform-origin: center center; transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, background 0.2s ease, box-shadow 0.2s ease; }
        .btn-alive { border: 1px solid #00e676; color: #00e676; }
        .btn-alive:hover { background: #00e676; color: #0c0805; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); transform: scale(1.04); }
        .btn-dead { border: 1px solid #ff3333; color: #ff3333; }
        .btn-dead:hover { background: #ff3333; color: #0c0805; box-shadow: 0 0 20px rgba(255, 51, 51, 0.4); transform: scale(1.04); }
        .btn-missing { border: 1px solid #b37446; color: #b37446; }
        .btn-missing:hover { background: #b37446; color: #0c0805; box-shadow: 0 0 20px rgba(179, 116, 70, 0.4); transform: scale(1.04); }
        
        /* 未選中按鈕與返回鍵縮小淡出 */
        .dir-btn.fnf-fade-out, .back-lobby-btn.fnf-hide { opacity: 0 !important; transform: scale(0.85) !important; pointer-events: none !important; }
        .dir-btn.fnf-selected { pointer-events: none; z-index: 99; filter: brightness(1.3); }
        
        .back-lobby-btn { 
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #8c7361; 
            font-size: 12px; 
            letter-spacing: 1.5px; 
            text-decoration: none; 
            border-bottom: 1px dashed transparent; 
            opacity: 1;
            z-index: 10;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.2s ease; 
            text-transform: uppercase; 
        }
        .back-lobby-btn:hover { color: #e5bd9c; border-bottom-color: #e5bd9c; }
        
        /* 點擊確認時，底部返回鍵會微微向下移動並絲滑淡出 */
        .back-lobby-btn.fnf-hide { 
            opacity: 0 !important; 
            transform: translate(-50%, 20px) scale(0.95) !important; 
            pointer-events: none !important; 
        }
    </style>
</head>
<body>

    <div class="lobby-container">
        <!-- 頂部多層標題組 -->
        <div class="lobby-header-group" id="fnf-header">
            <h1 class="lobby-title">CHARACTERS</h1>
            <p class="lobby-subtitle">Select a category to research them.</p>
        </div>

        <div class="directory-box" id="fnf-box">
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'alive.html')" class="dir-btn btn-alive">[ALIVE]</a>
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'dead.html')" class="dir-btn btn-dead">[DEAD]</a>
            <a onmouseenter="playHoverSound()" onclick="fnfNavigate(this, 'missing.html')" class="dir-btn btn-missing lock-btn">[MISSING]</a>
        </div>

        <!-- 底部返回大廳按鈕 -->
        <a onclick="fadeTo('lobby.html')" class="back-lobby-btn" id="fnf-back">&lt; RETURN TO LOBBY</a>
    </div>

    <!-- 引入共用動效與音效引擎 -->
    <script src="menu.js"></script>
</body>
</html>
